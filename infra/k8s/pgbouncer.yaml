apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
data:
  pgbouncer.ini: |
    [databases]
    * = host=postgres port=5432

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 5432
    auth_type = plain
    auth_file = /etc/pgbouncer/userlist.txt
    admin_users = agenthub
    stats_users = agenthub
    pool_mode = transaction
    max_client_conn = 200
    default_pool_size = 20
    reserve_pool_size = 5
    server_reset_query = DISCARD ALL
    ignore_startup_parameters = extra_float_digits
---
apiVersion: v1
kind: Secret
metadata:
  name: pgbouncer-auth
type: Opaque
stringData:
  userlist.txt: |
    "agenthub" "agenthub"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:v1.25.1-p0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          livenessProbe:
            tcpSocket:
              port: 5432
          readinessProbe:
            tcpSocket:
              port: 5432
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - mountPath: /etc/pgbouncer/pgbouncer.ini
              name: config
              subPath: pgbouncer.ini
            - mountPath: /etc/pgbouncer/userlist.txt
              name: auth
              subPath: userlist.txt
      volumes:
        - name: config
          configMap:
            name: pgbouncer-config
        - name: auth
          secret:
            secretName: pgbouncer-auth
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
spec:
  selector:
    app: pgbouncer
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
